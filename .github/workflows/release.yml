name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: lehua.exe
            asset: lehua-windows-x86_64
            archive: lehua-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: lehua
            asset: lehua-linux-x86_64
            archive: lehua-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p "staged/${{ matrix.asset }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "staged/${{ matrix.asset }}/${{ matrix.bin }}"
          cd staged
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "${{ matrix.archive }}" "${{ matrix.asset }}"
          else
            tar czf "${{ matrix.archive }}" "${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: staged/${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: staged
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          tag="v$version"
          echo "Releasing $tag"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes "Lehua $version. Prebuilt binaries are attached below. You can also build from source, see the README." \
            staged/*
